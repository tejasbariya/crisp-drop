<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── SEO & Identity ─────────────────────────────────────── -->
    <title>Crispdrop — Instant P2P File Sharing</title>
    <meta name="description" content="Share files instantly, directly between browsers. No uploads, no server storage — pure WebRTC peer-to-peer transfers, secured with room passwords." />
    <meta name="keywords" content="file sharing, P2P, WebRTC, peer to peer, browser, no upload, private, secure" />
    <meta name="author" content="Crispdrop" />

    <!-- ── PWA ────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Crispdrop" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── Icons ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- ── Open Graph ─────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Crispdrop — Instant P2P File Sharing" />
    <meta property="og:description" content="Share files instantly, directly between browsers. No uploads, no server storage — pure WebRTC P2P transfers." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- ── Twitter Card ───────────────────────────────────────── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Crispdrop — Instant P2P File Sharing" />
    <meta name="twitter:description" content="Browser-native P2P file sharing via WebRTC. Fast. Private. Free." />

    <!-- ── Color Scheme ───────────────────────────────────────── -->
    <meta name="color-scheme" content="light" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
